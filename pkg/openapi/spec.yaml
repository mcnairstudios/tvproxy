openapi: "3.0.3"
info:
  title: TVProxy API
  description: IPTV stream management and proxy server. Manages channels, streams (M3U and SAT>IP), EPG data, and emulates HDHomeRun devices for Plex/Emby/Jellyfin.
  version: "1.0.0"
servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Authentication and session management
  - name: Users
    description: User management (admin only)
  - name: M3U
    description: M3U account management
  - name: Streams
    description: Stream data from M3U accounts
  - name: Channels
    description: Channel management
  - name: ChannelGroups
    description: Channel group management
  - name: Logos
    description: Logo management (admin only)
  - name: StreamProfiles
    description: Stream profile management (admin only)
  - name: EPG
    description: EPG source and data management
  - name: HDHR
    description: HDHomeRun device management
  - name: Settings
    description: Application settings, export/import, reset (admin only)
  - name: Clients
    description: Client detection rule management (admin only)
  - name: Recordings
    description: Active and completed recordings
  - name: Scheduler
    description: Scheduled recording management
  - name: Activity
    description: Active viewer tracking (admin only)
  - name: WireGuard
    description: WireGuard VPN management (admin only)
  - name: Output
    description: Generated M3U playlist and EPG output
  - name: Proxy
    description: Channel and raw stream proxying
  - name: VOD
    description: VOD session management (probe, create, seek, stream)
  - name: DLNA
    description: DLNA MediaServer endpoints

paths:
  # ── Auth ────────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/invite/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Accept an invitation and set password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: Account activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/logout:
    post:
      summary: Logout
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Users ───────────────────────────────────────────────────────────
  /api/users:
    get:
      summary: List users
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: Create user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
                is_admin:
                  type: boolean
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/users/invite:
    post:
      summary: Create invite for a new user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/users/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                is_admin:
                  type: boolean
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete user
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: User deleted

  # ── M3U Accounts ────────────────────────────────────────────────────
  /api/m3u/accounts:
    get:
      summary: List M3U accounts
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/M3UAccount"
    post:
      summary: Create M3U account (admin only)
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/M3UAccountInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M3UAccount"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/m3u/accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get M3U account
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M3UAccount"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update M3U account (admin only)
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/M3UAccountInput"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M3UAccount"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete M3U account (admin only)
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Account deleted

  /api/m3u/accounts/{id}/refresh:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      summary: Refresh M3U account streams (async, admin only)
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Refresh started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/m3u/accounts/{id}/status:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get M3U account refresh status
      tags: [M3U]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Refresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshStatus"

  # ── Streams ─────────────────────────────────────────────────────────
  /api/streams:
    get:
      summary: List streams
      description: Returns summaries by default. Use ?full=true for all fields. Use ?account_id={id} to filter by M3U account.
      tags: [Streams]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: full
          in: query
          schema:
            type: string
            enum: ["true"]
          description: If "true", returns full stream objects instead of summaries
        - name: account_id
          in: query
          schema:
            type: string
          description: Filter by M3U account ID
      responses:
        "200":
          description: List of streams or stream summaries
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/Stream"
                  - type: array
                    items:
                      $ref: "#/components/schemas/StreamSummary"

  /api/streams/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get stream
      tags: [Streams]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stream details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stream"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete stream (admin only)
      tags: [Streams]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Stream deleted

  # ── Channels ────────────────────────────────────────────────────────
  /api/channels:
    get:
      summary: List channels
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      summary: Create channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelInput"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/channels/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Channel details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelInput"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Channel deleted

  /api/channels/{id}/streams:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get streams assigned to channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of channel stream assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelStream"
    post:
      summary: Assign streams to channel
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stream_ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Streams assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/channels/{id}/fail:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      summary: Increment channel fail count
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
    delete:
      summary: Reset channel fail count
      tags: [Channels]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Fail count reset

  # ── Channel Groups ──────────────────────────────────────────────────
  /api/channel-groups:
    get:
      summary: List channel groups
      tags: [ChannelGroups]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of channel groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelGroup"
    post:
      summary: Create channel group
      tags: [ChannelGroups]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelGroupInput"
      responses:
        "201":
          description: Channel group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelGroup"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/channel-groups/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get channel group
      tags: [ChannelGroups]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Channel group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelGroup"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update channel group
      tags: [ChannelGroups]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelGroupInput"
      responses:
        "200":
          description: Channel group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelGroup"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete channel group
      tags: [ChannelGroups]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Channel group deleted

  # ── Logos ────────────────────────────────────────────────────────────
  /api/logos:
    get:
      summary: List logos
      tags: [Logos]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of logos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Logo"
    post:
      summary: Create logo
      tags: [Logos]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                url:
                  type: string
      responses:
        "201":
          description: Logo created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Logo"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/logos/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get logo
      tags: [Logos]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logo details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Logo"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update logo
      tags: [Logos]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
      responses:
        "200":
          description: Logo updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Logo"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete logo
      tags: [Logos]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Logo deleted

  # ── Stream Profiles ─────────────────────────────────────────────────
  /api/stream-profiles:
    get:
      summary: List stream profiles
      tags: [StreamProfiles]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of stream profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StreamProfile"
    post:
      summary: Create stream profile
      tags: [StreamProfiles]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamProfileInput"
      responses:
        "201":
          description: Stream profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Profile name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/stream-profiles/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get stream profile
      tags: [StreamProfiles]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stream profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamProfile"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update stream profile
      tags: [StreamProfiles]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamProfileInput"
      responses:
        "200":
          description: Stream profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamProfile"
        "403":
          description: Cannot edit system profile or rename client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Profile name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Delete stream profile
      tags: [StreamProfiles]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Stream profile deleted
        "403":
          description: Cannot delete system or client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── EPG Sources ─────────────────────────────────────────────────────
  /api/epg/sources:
    get:
      summary: List EPG sources
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of EPG sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EPGSource"
    post:
      summary: Create EPG source (admin only)
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                url:
                  type: string
                is_enabled:
                  type: boolean
      responses:
        "201":
          description: EPG source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EPGSource"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/epg/sources/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get EPG source
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: EPG source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EPGSource"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update EPG source (admin only)
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                is_enabled:
                  type: boolean
      responses:
        "200":
          description: EPG source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EPGSource"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete EPG source (admin only)
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: EPG source deleted

  /api/epg/sources/{id}/refresh:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      summary: Refresh EPG source (async, admin only)
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      responses:
        "202":
          description: Refresh started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/epg/sources/{id}/status:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      summary: Get EPG source refresh status
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Refresh status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshStatus"

  # ── EPG Data ────────────────────────────────────────────────────────
  /api/epg/data:
    get:
      summary: List EPG data
      description: Returns EPG channel data. Use ?source_id to filter by source. Use ?programs=true to include program data.
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: source_id
          in: query
          schema:
            type: string
          description: Filter by EPG source ID
        - name: programs
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Include program data in response
      responses:
        "200":
          description: EPG data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EPGData"

  /api/epg/now:
    get:
      summary: Get currently playing programs
      description: Returns the currently playing program per EPG channel. Use ?channel_id to get a single channel.
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: channel_id
          in: query
          schema:
            type: string
          description: EPG channel ID to query (returns single program if set)
      responses:
        "200":
          description: Now playing data
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/ProgramData"

  /api/epg/guide:
    get:
      summary: Get EPG guide data
      description: Returns programs grouped by EPG channel ID for a time window.
      tags: [EPG]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 6
          description: Number of hours to include
        - name: start
          in: query
          schema:
            type: string
            format: date-time
          description: Start time in RFC3339 format (defaults to now)
      responses:
        "200":
          description: Guide data
          content:
            application/json:
              schema:
                type: object
                properties:
                  start:
                    type: string
                    format: date-time
                  stop:
                    type: string
                    format: date-time
                  programs:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        $ref: "#/components/schemas/GuideProgram"

