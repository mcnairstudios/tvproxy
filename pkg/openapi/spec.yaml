  # ── Proxy ───────────────────────────────────────────────────────────
  /channel/{channelID}:
    parameters:
      - name: channelID
        in: path
        required: true
        schema:
          type: string
        description: Channel ID (UUID). May include a file extension like .ts or .mp4 which is stripped.
    get:
      summary: Proxy stream for channel
      tags: [Proxy]
      parameters:
        - name: profile
          in: query
          schema:
            type: string
          description: Stream profile name override
      responses:
        "200":
          description: Stream data
          content:
            video/mp2t: {}
        "403":
          description: Channel is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
    head:
      summary: HEAD request for channel stream (returns content-type and DLNA headers)
      tags: [Proxy]
      parameters:
        - name: profile
          in: query
          schema:
            type: string
          description: Stream profile name override
      responses:
        "200":
          description: Stream headers

  /stream/{streamID}:
    parameters:
      - name: streamID
        in: path
        required: true
        schema:
          type: string
        description: Stream ID (UUID). May include a file extension which is stripped.
    get:
      summary: Proxy raw stream directly
      tags: [Proxy]
      parameters:
        - name: profile
          in: query
          schema:
            type: string
          description: Stream profile name override
      responses:
        "200":
          description: Stream data
          content:
            video/mp2t: {}
        "404":
          $ref: "#/components/responses/NotFound"

  # ── VOD ─────────────────────────────────────────────────────────────
  /stream/{streamID}/probe:
    parameters:
      - name: streamID
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Probe a stream to determine if it is live or VOD
      tags: [VOD]
      responses:
        "200":
          description: Probe result
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    enum: [live, vod]
                  duration:
                    type: number
                    description: Duration in seconds (VOD only)
                  width:
                    type: integer
                    description: Video width (VOD only)
                  height:
                    type: integer
                    description: Video height (VOD only)
        "404":
          $ref: "#/components/responses/NotFound"

  /stream/{streamID}/vod:
    parameters:
      - name: streamID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Create VOD session from stream
      tags: [VOD]
      parameters:
        - name: profile
          in: query
          schema:
            type: string
          description: Stream profile name
        - name: audio
          in: query
          schema:
            type: integer
          description: Audio track index
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  duration:
                    type: number
        "404":
          $ref: "#/components/responses/NotFound"

  /channel/{channelID}/vod:
    parameters:
      - name: channelID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Create VOD session from channel
      tags: [VOD]
      parameters:
        - name: profile
          in: query
          schema:
            type: string
          description: Stream profile name
        - name: audio
          in: query
          schema:
            type: integer
          description: Audio track index
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  duration:
                    type: number
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}/status:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get VOD session status
      tags: [VOD]
      responses:
        "200":
          description: Session status
          content:
            application/json:
              schema:
                type: object
                properties:
                  buffered:
                    type: number
                  duration:
                    type: number
                  ready:
                    type: boolean
                  error:
                    type: string
                  recording:
                    type: boolean
                  segments:
                    type: array
                    items:
                      $ref: "#/components/schemas/SegmentInfo"
                  audio_index:
                    type: integer
                  profile:
                    type: string
                  video:
                    type: object
                    description: Video info (if available)
                  audio_tracks:
                    type: array
                    items:
                      type: object
                    description: Audio track info (if available)
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}/seek:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Seek and stream from offset
      tags: [VOD]
      parameters:
        - name: t
          in: query
          required: true
          schema:
            type: number
          description: Time offset in seconds
      responses:
        "200":
          description: Stream from offset
          content:
            video/mp4: {}
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}/stream:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Stream VOD session
      tags: [VOD]
      responses:
        "200":
          description: Video stream
          content:
            video/mp4: {}
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Delete VOD session
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Session deleted

  /vod/{sessionID}/record:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Mark VOD session for recording (create segment)
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordRequest"
      responses:
        "200":
          description: Recording started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  segment:
                    type: object
                    properties:
                      id:
                        type: string
                      start_offset:
                        type: number
                      end_offset:
                        type: number
                      status:
                        type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Active segment already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vod/{sessionID}/record/{segmentID}:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
      - name: segmentID
        in: path
        required: true
        schema:
          type: string
    put:
      summary: Update recording segment offsets
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_offset:
                  type: number
                  nullable: true
                end_offset:
                  type: number
                  nullable: true
      responses:
        "204":
          description: Segment updated
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete recording segment
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Segment deleted
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}/stop:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Stop recording on a VOD session
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: extract
          in: query
          schema:
            type: string
            enum: ["true"]
          description: If "true", close and extract the segment immediately
      responses:
        "204":
          description: Recording stopped
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /vod/{sessionID}/cancel:
    parameters:
      - name: sessionID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Cancel recording on a VOD session
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Recording cancelled
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  /channel/{channelID}/record:
    parameters:
      - name: channelID
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Create a headless recording session for a channel
      tags: [VOD]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordRequest"
      responses:
        "200":
          description: Recording session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                  status:
                    type: string
                  segment:
                    type: object
                    properties:
                      id:
                        type: string
                      start_offset:
                        type: number
                      status:
                        type: string

  # ── HDHR Emulation (public) ─────────────────────────────────────────
  /discover.json:
    get:
      summary: HDHomeRun device discovery
      tags: [HDHR]
      responses:
        "200":
          description: Discovery response
          content:
            application/json:
              schema:
                type: object
        "404":
          description: No HDHR device configured

  /lineup_status.json:
    get:
      summary: HDHomeRun lineup status
      tags: [HDHR]
      responses:
        "200":
          description: Lineup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ScanInProgress:
                    type: integer
                  ScanPossible:
                    type: integer
                  Source:
                    type: string
                  SourceList:
                    type: array
                    items:
                      type: string

  /lineup.json:
    get:
      summary: HDHomeRun channel lineup
      tags: [HDHR]
      responses:
        "200":
          description: Channel lineup
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /device.xml:
    get:
      summary: HDHomeRun device XML description
      tags: [HDHR]
      responses:
        "200":
          description: Device XML
          content:
            application/xml:
              schema:
                type: object
        "404":
          description: No HDHR device configured

  /capability:
    get:
      summary: HDHomeRun capability (alias for device.xml)
      tags: [HDHR]
      responses:
        "200":
          description: Device XML
          content:
            application/xml:
              schema:
                type: object

  # ── DLNA ────────────────────────────────────────────────────────────
  /dlna/device.xml:
    get:
      summary: DLNA device description XML
      tags: [DLNA]
      responses:
        "200":
          description: Device description
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: DLNA not enabled

  /dlna/ContentDirectory.xml:
    get:
      summary: DLNA ContentDirectory service description
      tags: [DLNA]
      responses:
        "200":
          description: SCPD XML
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: DLNA not enabled

  /dlna/ConnectionManager.xml:
    get:
      summary: DLNA ConnectionManager service description
      tags: [DLNA]
      responses:
        "200":
          description: SCPD XML
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: DLNA not enabled

  /dlna/control/ContentDirectory:
    post:
      summary: DLNA ContentDirectory SOAP control
      tags: [DLNA]
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              type: string
      responses:
        "200":
          description: SOAP response
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: DLNA not enabled

  /dlna/control/ConnectionManager:
    post:
      summary: DLNA ConnectionManager SOAP control
      tags: [DLNA]
      requestBody:
        required: true
        content:
          text/xml:
            schema:
              type: string
      responses:
        "200":
          description: SOAP response
          content:
            text/xml:
              schema:
                type: string
        "404":
          description: DLNA not enabled

  # ── OpenAPI Spec ────────────────────────────────────────────────────
  /api/openapi.yaml:
    get:
      summary: OpenAPI specification
      tags: [Settings]
      responses:
        "200":
          description: OpenAPI YAML spec
          content:
            application/x-yaml:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        is_admin:
          type: boolean
        invite_token:
          type: string
          nullable: true
        invite_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    M3UAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [m3u, xtream]
        username:
          type: string
        password:
          type: string
        max_streams:
          type: integer
        is_enabled:
          type: boolean
        last_refreshed:
          type: string
          format: date-time
          nullable: true
        stream_count:
          type: integer
        refresh_interval:
          type: integer
          description: Seconds, 0 = use default
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    M3UAccountInput:
      type: object
      required: [name, url]
      properties:
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [m3u, xtream]
        username:
          type: string
        password:
          type: string
        max_streams:
          type: integer
        is_enabled:
          type: boolean
        refresh_interval:
          type: integer
          description: Seconds, 0 = use default

    Stream:
      type: object
      properties:
        id:
          type: string
          format: uuid
        m3u_account_id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        group:
          type: string
        logo:
          type: string
        tvg_id:
          type: string
        tvg_name:
          type: string
        content_hash:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StreamSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        m3u_account_id:
          type: string
          format: uuid
        name:
          type: string
        group:
          type: string
        logo:
          type: string

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        logo_id:
          type: string
          format: uuid
          nullable: true
        logo:
          type: string
        logo_cached:
          type: string
        tvg_id:
          type: string
        channel_group_id:
          type: string
          format: uuid
          nullable: true
        stream_profile_id:
          type: string
          format: uuid
          nullable: true
        fail_count:
          type: integer
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChannelInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        logo:
          type: string
          description: Logo URL (creates logo record if needed)
        logo_id:
          type: string
          format: uuid
          nullable: true
          description: Existing logo ID
        tvg_id:
          type: string
        channel_group_id:
          type: string
          format: uuid
          nullable: true
        stream_profile_id:
          type: string
          format: uuid
          nullable: true
        is_enabled:
          type: boolean

    ChannelStream:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        stream_id:
          type: string
          format: uuid
        priority:
          type: integer

    ChannelGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        is_enabled:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChannelGroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        is_enabled:
          type: boolean
        sort_order:
          type: integer

    Logo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        cached_filename:
          type: string
        created_at:
          type: string
          format: date-time

    StreamProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        stream_mode:
          type: string
          enum: [direct, proxy, ffmpeg]
        source_type:
          type: string
          enum: [satip, m3u]
        hwaccel:
          type: string
          enum: [none, qsv, nvenc, vaapi, videotoolbox]
        video_codec:
          type: string
          enum: [copy, h264, h265, av1]
        container:
          type: string
          enum: [mpegts, matroska, mp4, webm]
        deinterlace:
          type: boolean
        fps_mode:
          type: string
          enum: [auto, cfr]
        use_custom_args:
          type: boolean
        custom_args:
          type: string
        command:
          type: string
        args:
          type: string
        is_default:
          type: boolean
        is_system:
          type: boolean
        is_client:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StreamProfileInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        stream_mode:
          type: string
          enum: [direct, proxy, ffmpeg]
        source_type:
          type: string
          enum: [satip, m3u]
        hwaccel:
          type: string
          enum: [none, qsv, nvenc, vaapi, videotoolbox]
        video_codec:
          type: string
          enum: [copy, h264, h265, av1]
        container:
          type: string
          enum: [mpegts, matroska, mp4, webm]
        deinterlace:
          type: boolean
        fps_mode:
          type: string
          enum: [auto, cfr]
        use_custom_args:
          type: boolean
        custom_args:
          type: string
        is_default:
          type: boolean

    EPGSource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        is_enabled:
          type: boolean
        last_refreshed:
          type: string
          format: date-time
          nullable: true
        channel_count:
          type: integer
        program_count:
          type: integer
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EPGData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        epg_source_id:
          type: string
          format: uuid
        channel_id:
          type: string
        name:
          type: string
        icon:
          type: string
        programs:
          type: array
          items:
            $ref: "#/components/schemas/ProgramData"
          description: Only included when ?programs=true

    ProgramData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        epg_data_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        start:
          type: string
          format: date-time
        stop:
          type: string
          format: date-time
        category:
          type: string
        episode_num:
          type: string
        icon:
          type: string
        subtitle:
          type: string
        date:
          type: string
        language:
          type: string
        is_new:
          type: boolean
        is_previously_shown:
          type: boolean
        credits:
          type: string
        rating:
          type: string
        rating_icon:
          type: string
        star_rating:
          type: string
        sub_categories:
          type: string
        episode_num_system:
          type: string

    GuideProgram:
      type: object
      properties:
        channel_id:
          type: string
        title:
          type: string
        description:
          type: string
        start:
          type: string
          format: date-time
        stop:
          type: string
          format: date-time
        category:
          type: string

    HDHRDevice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        device_id:
          type: string
        device_auth:
          type: string
        firmware_version:
          type: string
        tuner_count:
          type: integer
        port:
          type: integer
        channel_group_ids:
          type: array
          items:
            type: string
            format: uuid
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HDHRDeviceInput:
      type: object
      required: [name, device_id]
      properties:
        name:
          type: string
        device_id:
          type: string
        device_auth:
          type: string
        firmware_version:
          type: string
        tuner_count:
          type: integer
        port:
          type: integer
          description: Auto-assigned if not provided
        channel_group_ids:
          type: array
          items:
            type: string
            format: uuid
        is_enabled:
          type: boolean

    CoreSetting:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        priority:
          type: integer
        stream_profile_id:
          type: string
          format: uuid
        is_enabled:
          type: boolean
        match_rules:
          type: array
          items:
            $ref: "#/components/schemas/ClientMatchRule"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClientMatchRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        header_name:
          type: string
        match_type:
          type: string
          enum: [exists, contains, equals, prefix]
        match_value:
          type: string

    ClientInput:
      type: object
      required: [name, match_rules]
      properties:
        name:
          type: string
        priority:
          type: integer
        is_enabled:
          type: boolean
        match_rules:
          type: array
          minItems: 1
          items:
            type: object
            required: [header_name, match_type]
            properties:
              header_name:
                type: string
              match_type:
                type: string
                enum: [exists, contains, equals, prefix]
              match_value:
                type: string

    ClientUpdateInput:
      type: object
      properties:
        name:
          type: string
        priority:
          type: integer
          nullable: true
        stream_profile_id:
          type: string
          format: uuid
          nullable: true
        is_enabled:
          type: boolean
          nullable: true
        match_rules:
          type: array
          minItems: 1
          items:
            type: object
            required: [header_name, match_type]
            properties:
              header_name:
                type: string
              match_type:
                type: string
                enum: [exists, contains, equals, prefix]
              match_value:
                type: string

    ActiveViewer:
      type: object
      properties:
        id:
          type: string
        channel_id:
          type: string
        channel_name:
          type: string
        stream_id:
          type: string
        stream_name:
          type: string
        m3u_account_id:
          type: string
        profile_name:
          type: string
        user_agent:
          type: string
        client_name:
          type: string
        remote_addr:
          type: string
        started_at:
          type: string
        last_active:
          type: string
        idle_secs:
          type: number
        type:
          type: string

    RefreshStatus:
      type: object
      properties:
        state:
          type: string
          enum: [idle, refreshing, done, error]
        message:
          type: string

    SegmentInfo:
      type: object
      properties:
        id:
          type: string
        start_offset:
          type: number
        end_offset:
          type: number
          nullable: true
        status:
          type: string
        title:
          type: string

    RecordingInfo:
      type: object
      properties:
        session_id:
          type: string
        channel_name:
          type: string
        program_title:
          type: string
        buffered_secs:
          type: number
        stop_at:
          type: string
        user_id:
          type: string
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentInfo"

    CompletedRecording:
      type: object
      properties:
        filename:
          type: string
        size:
          type: integer
          format: int64
        mod_time:
          type: string
        user_id:
          type: string

    RecordRequest:
      type: object
      properties:
        program_title:
          type: string
        channel_name:
          type: string
        stop_at:
          type: string
          format: date-time
          description: RFC3339 timestamp for when to stop recording
        start_offset:
          type: number
        end_offset:
          type: number

    ScheduledRecording:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        channel_name:
          type: string
        program_title:
          type: string
        start_at:
          type: string
          format: date-time
        stop_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, recording, completed, failed, cancelled]
        session_id:
          type: string
        segment_id:
          type: string
        file_path:
          type: string
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ExportData:
      type: object
      properties:
        version:
          type: integer
        scope:
          type: string
          enum: [channels, full]
        exported_at:
          type: string
          format: date-time
        channel_groups:
          type: array
          items:
            $ref: "#/components/schemas/ChannelGroup"
        channels:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              tvg_id:
                type: string
              group_name:
                type: string
              profile_name:
                type: string
              is_enabled:
                type: boolean
              stream_ids:
                type: array
                items:
                  type: string
        stream_profiles:
          type: array
          items:
            $ref: "#/components/schemas/StreamProfile"
        clients:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        settings:
          type: array
          items:
            $ref: "#/components/schemas/CoreSetting"
        users:
          type: array
          items:
            type: object
            properties:
              username:
                type: string
              is_admin:
                type: boolean
        m3u_accounts:
          type: array
          items:
            $ref: "#/components/schemas/M3UAccount"
        epg_sources:
          type: array
          items:
            $ref: "#/components/schemas/EPGSource"

    WireGuardConnectRequest:
      type: object
      required: [private_key, address, dns, peer_public_key, peer_endpoint]
      properties:
        private_key:
          type: string
          description: Base64-encoded WireGuard private key
        address:
          type: string
          description: Interface address with CIDR (e.g. 10.20.30.40/24)
        dns:
          type: string
          description: Comma-separated DNS addresses
        peer_public_key:
          type: string
          description: Base64-encoded peer public key
        peer_endpoint:
          type: string
          description: Peer endpoint (host:port)
        route_hosts:
          type: string
          description: Comma-separated hostnames to route through the tunnel
