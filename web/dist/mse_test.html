<!DOCTYPE html>
<html><head><title>MSE Segment Test</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:20px}
video{max-width:800px;background:#000;display:block;margin:10px 0}
.ok{color:#0c0}.err{color:#f44}.warn{color:#fa0}.info{color:#48f}
#log{max-height:500px;overflow-y:auto;background:#1a1a2e;padding:10px;border-radius:4px;font-size:12px}
#status{font-size:1.2em;margin:10px 0}
button{padding:8px 16px;margin:4px;font-size:14px;cursor:pointer}
</style></head><body>
<h2>TVProxy MSE Direct Test</h2>
<div>
  <button onclick="startTest()">Start 5 HD (SAT>IP)</button>
  <button onclick="stopTest()">Stop</button>
</div>
<div id="status">Ready</div>
<video id="v" controls muted autoplay></video>
<div id="log"></div>
<script>
const BASE = '';
const STREAM_ID = 'a47a79f0-72f4-5244-8e35-b187066dc67c'; // 5 HD
let TOKEN = '';

const v = document.getElementById('v');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
let sessionId = null;
let consumerId = null;
let abortCtrl = null;

function log(m, c) {
  const d = document.createElement('div');
  d.className = c || 'info';
  d.textContent = new Date().toISOString().substr(11, 12) + ' ' + m;
  logEl.insertBefore(d, logEl.firstChild);
  if (logEl.children.length > 200) logEl.removeChild(logEl.lastChild);
}

async function login() {
  const r = await fetch(BASE + '/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: 'admin', password: 'admin' }),
  });
  if (!r.ok) throw new Error('Login failed: ' + r.status);
  const data = await r.json();
  TOKEN = data.access_token;
  log('Logged in, token obtained', 'ok');
}

function authHeaders() {
  const h = { 'Content-Type': 'application/json' };
  if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
  return h;
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: authHeaders(),
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok && r.status !== 204) throw new Error(path + ': ' + r.status + ' ' + r.statusText);
  if (r.status === 204) return null;
  return r.json();
}

async function fetchBin(path, signal) {
  const h = {};
  if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(BASE + path, {
    headers: h,
    signal,
    cache: 'no-store',
  });
  return r;
}

function detectCodec(buf) {
  const d = new Uint8Array(buf);
  for (let i = 0; i < d.length - 8; i++) {
    if (d[i]==0x61&&d[i+1]==0x76&&d[i+2]==0x63&&d[i+3]==0x43) {
      const h = n => n.toString(16).padStart(2,'0');
      return 'avc1.' + h(d[i+5]) + h(d[i+6]) + h(d[i+7]);
    }
    if (d[i]==0x68&&d[i+1]==0x76&&d[i+2]==0x63&&d[i+3]==0x43) {
      const p = d[i+5]&0x1F, t = (d[i+5]>>5)&1, l = d[i+16];
      return 'hev1.' + p + '.4.' + (t?'H':'L') + l;
    }
  }
  return 'avc1.640028';
}

function waitUpdate(sb) {
  return new Promise((ok, fail) => {
    if (!sb.updating) { ok(); return; }
    sb.addEventListener('updateend', ok, {once:true});
    sb.addEventListener('error', () => fail(new Error('SB error')), {once:true});
  });
}

async function appendBuf(sb, data, label) {
  await waitUpdate(sb);
  sb.appendBuffer(data);
  await waitUpdate(sb);
  log(label + ' appended (' + data.byteLength + ' bytes)', 'ok');
}

async function startTest() {
  stopTest();
  abortCtrl = new AbortController();
  const signal = abortCtrl.signal;

  try {
    // 0. Login
    await login();

    // 1. Create session
    log('Creating session...');
    statusEl.textContent = 'Creating session...';
    const sess = await api('POST', '/stream/' + STREAM_ID + '/vod?profile=Browser');
    sessionId = sess.session_id || sess.channel_id || STREAM_ID;
    consumerId = sess.consumer_id;
    log('Session: ' + sessionId + ' delivery=' + sess.delivery + ' container=' + sess.container, 'ok');

    const basePath = '/vod/' + sessionId + '/mse/';

    // 2. Poll for init segments
    log('Waiting for init segments...');
    statusEl.textContent = 'Waiting for pipeline...';

    let videoInit = null, audioInit = null, gen = '1';
    for (let i = 0; i < 60 && !signal.aborted; i++) {
      const r = await fetchBin(basePath + 'video/init', signal);
      if (r.ok) {
        videoInit = await r.arrayBuffer();
        gen = r.headers.get('X-Gen') || '1';
        log('Video init: ' + videoInit.byteLength + ' bytes, gen=' + gen, 'ok');
        break;
      }
      statusEl.textContent = 'Waiting for pipeline... (' + (i+1) + '/60)';
      await new Promise(r => setTimeout(r, 500));
    }
    if (!videoInit) { log('No video init after 30s', 'err'); return; }

    for (let i = 0; i < 30 && !signal.aborted; i++) {
      const r = await fetchBin(basePath + 'audio/init', signal);
      if (r.ok) {
        audioInit = await r.arrayBuffer();
        log('Audio init: ' + audioInit.byteLength + ' bytes', 'ok');
        break;
      }
      await new Promise(r => setTimeout(r, 500));
    }

    // 3. Debug info
    try {
      const dbg = await api('GET', basePath + 'debug');
      log('Debug: ' + JSON.stringify(dbg), 'info');
    } catch(e) {}

    // 4. Setup MSE
    const codec = detectCodec(videoInit);
    log('Detected codec: ' + codec, 'info');

    const ms = new MediaSource();
    v.src = URL.createObjectURL(ms);
    await new Promise(r => ms.addEventListener('sourceopen', r, {once:true}));
    log('MediaSource opened', 'ok');

    const vMime = 'video/mp4; codecs="' + codec + '"';
    const aMime = 'audio/mp4; codecs="mp4a.40.2"';

    let vSb, aSb;
    try {
      vSb = ms.addSourceBuffer(vMime);
      log('Video SB: ' + vMime, 'ok');
    } catch(e) {
      log('Video SB failed: ' + e.message + ' — trying fallback', 'err');
      vSb = ms.addSourceBuffer('video/mp4; codecs="avc1.4d4028"');
    }
    vSb.mode = 'segments';
    vSb.addEventListener('error', () => log('VIDEO SB ERROR', 'err'));

    if (audioInit) {
      try {
        aSb = ms.addSourceBuffer(aMime);
        aSb.mode = 'segments';
        aSb.addEventListener('error', () => log('AUDIO SB ERROR', 'err'));
        log('Audio SB: ' + aMime, 'ok');
      } catch(e) { log('Audio SB failed: ' + e.message, 'warn'); }
    }

    v.addEventListener('error', () => log('VIDEO ERROR: ' + (v.error ? v.error.code + ' ' + v.error.message : 'unknown'), 'err'));

    // 5. Append init segments
    await appendBuf(vSb, videoInit, 'V-init');
    if (aSb && audioInit) await appendBuf(aSb, audioInit, 'A-init');

    // 6. Poll segments
    statusEl.textContent = 'Fetching segments...';
    let vSeq = 1, aSeq = 1, started = false, totalSegs = 0;

    async function pollVideo() {
      while (!signal.aborted) {
        const r = await fetchBin(basePath + 'video/segment?gen=' + gen + '&seq=' + vSeq, signal).catch(() => null);
        if (!r) { await new Promise(r => setTimeout(r, 500)); continue; }
        if (r.status === 410) { log('Video gen changed', 'warn'); return; }
        if (r.status === 404) { await new Promise(r => setTimeout(r, 300)); continue; }
        if (!r.ok) { log('Video seg ' + vSeq + ': HTTP ' + r.status, 'err'); await new Promise(r => setTimeout(r, 500)); continue; }
        const data = await r.arrayBuffer();
        await appendBuf(vSb, data, 'V' + vSeq);
        vSeq++;
        totalSegs++;
        statusEl.textContent = 'Playing — V:' + (vSeq-1) + ' A:' + (aSeq-1) + ' total:' + totalSegs;
        if (!started && vSb.buffered.length > 0) {
          started = true;
          v.currentTime = vSb.buffered.start(0);
          v.play().catch(e => log('Play: ' + e.message, 'warn'));
          log('Playing from ' + v.currentTime.toFixed(2) + 's', 'ok');
        }
      }
    }

    async function pollAudio() {
      if (!aSb) return;
      while (!signal.aborted) {
        const r = await fetchBin(basePath + 'audio/segment?gen=' + gen + '&seq=' + aSeq, signal).catch(() => null);
        if (!r) { await new Promise(r => setTimeout(r, 500)); continue; }
        if (r.status === 410) { log('Audio gen changed', 'warn'); return; }
        if (r.status === 404) { await new Promise(r => setTimeout(r, 300)); continue; }
        if (!r.ok) { await new Promise(r => setTimeout(r, 500)); continue; }
        const data = await r.arrayBuffer();
        await appendBuf(aSb, data, 'A' + aSeq);
        aSeq++;
        totalSegs++;
      }
    }

    pollVideo();
    pollAudio();

    // Status updater
    const si = setInterval(() => {
      if (signal.aborted) { clearInterval(si); return; }
      const buf = v.buffered.length > 0 ? v.buffered.end(0).toFixed(1) : '0';
      statusEl.textContent = 'V:' + (vSeq-1) + ' A:' + (aSeq-1) + ' Buf:' + buf + 's Time:' + v.currentTime.toFixed(1) + 's State:' + v.readyState;
    }, 500);

  } catch(e) {
    if (e.name !== 'AbortError') {
      log('FATAL: ' + e.message, 'err');
      statusEl.textContent = 'Error: ' + e.message;
    }
  }
}

function stopTest() {
  if (abortCtrl) abortCtrl.abort();
  if (sessionId && consumerId) {
    const h = {};
    if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
    fetch(BASE + '/vod/' + sessionId + '?consumer_id=' + consumerId, {
      method: 'DELETE',
      headers: h,
    }).catch(() => {});
  }
  sessionId = null;
  consumerId = null;
  statusEl.textContent = 'Stopped';
}
</script></body></html>
