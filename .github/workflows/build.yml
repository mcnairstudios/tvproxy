name: Build TVProxy Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: gavinmcnair/tvproxy
  TAG: latest

jobs:
  build-amd64:
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Build
        run: |
          VERSION=$(git rev-parse --short HEAD)
          docker build --build-arg VERSION=$VERSION --build-arg GOMAXPROCS=16 -t $IMAGE:$TAG-amd64 .
      - name: Push
        run: docker push $IMAGE:$TAG-amd64

  build-arm64:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Build
        run: |
          VERSION=$(git rev-parse --short HEAD)
          docker build --build-arg VERSION=$VERSION --build-arg GOMAXPROCS=4 -t $IMAGE:$TAG-arm64 .
      - name: Push
        run: docker push $IMAGE:$TAG-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: [self-hosted, linux, arm64]
    steps:
      - name: Log in to Docker Hub
        run: echo "${DOCKERHUB_PASSWORD}" | docker login -u "${DOCKERHUB_LOGIN}" --password-stdin
      - name: Create and push multi-arch manifest
        run: |
          docker manifest create $IMAGE:$TAG \
            --amend $IMAGE:$TAG-amd64 \
            --amend $IMAGE:$TAG-arm64
          docker manifest push $IMAGE:$TAG
